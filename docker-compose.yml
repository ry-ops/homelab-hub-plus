services:
  app:
    build: .
    container_name: homelab-hub-plus
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://homelab:homelab@postgres:5432/homelab
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=${QDRANT_URL:-http://localhost:6333}
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-homelab}
      - API_TOKEN=${API_TOKEN:-}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: homelab-hub-plus-postgres
    environment:
      - POSTGRES_USER=homelab
      - POSTGRES_PASSWORD=homelab
      - POSTGRES_DB=homelab
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: homelab-hub-plus-redis
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
